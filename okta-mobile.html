<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Okta</title>
  <meta name="theme-color" content="#0f0f14">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script src="https://accounts.google.com/gsi/client" async></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <style>
    :root {
      --bg:         #0f0f14;
      --surface:    #1c1c26;
      --surface2:   #252535;
      --accent:     #f59e0b;
      --accent-dim: rgba(245,158,11,0.15);
      --text:       #e8e8f0;
      --text-dim:   #8888a8;
      --border:     #2a2a3a;
      --danger:     #ef4444;
      --success:    #22c55e;
      --mono:       'Courier New', monospace;
      --r:          8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', serif;
      font-size: 15px;
      line-height: 1.5;
      overflow: hidden;
    }

    /* ── Auth ── */
    #authScreen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      gap: 28px;
      padding: 32px;
      background: radial-gradient(ellipse at 50% 60%, #1c1428 0%, var(--bg) 70%);
    }

    .logo {
      font-family: var(--mono);
      font-size: 52px;
      color: var(--accent);
      letter-spacing: -3px;
    }

    .tagline {
      color: var(--text-dim);
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .btn-signin {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--accent);
      color: #000;
      border: none;
      padding: 14px 28px;
      border-radius: var(--r);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    /* ── App shell ── */
    #app {
      display: none;
      flex-direction: column;
      height: 100dvh;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-logo { font-family: var(--mono); font-size: 20px; color: var(--accent); font-weight: bold; }
    .header-user { font-size: 11px; color: var(--text-dim); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .content { flex: 1; overflow-y: auto; padding: 16px; }

    /* ── Tab bar ── */
    .tabbar {
      display: flex;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .tab {
      flex: 1;
      padding: 10px 8px 8px;
      text-align: center;
      font-size: 11px;
      color: var(--text-dim);
      cursor: pointer;
      border: none;
      background: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      transition: color 0.2s;
    }

    .tab .icon { font-size: 20px; line-height: 1; }
    .tab.active { color: var(--accent); }

    /* ── Panels ── */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── Form ── */
    .section-title {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 14px;
    }

    .form-group { margin-bottom: 14px; }

    label {
      display: block;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="date"],
    select,
    textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px;
      border-radius: var(--r);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 72px; }

    /* Priority buttons */
    .prio-group { display: flex; gap: 8px; }

    .prio-btn {
      flex: 1;
      padding: 10px 6px;
      border-radius: var(--r);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-dim);
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .prio-btn.sel-haute   { background: rgba(239,68,68,.2);  border-color: #ef4444; color: #ef4444; }
    .prio-btn.sel-moyenne { background: rgba(245,158,11,.2); border-color: var(--accent); color: var(--accent); }
    .prio-btn.sel-basse   { background: rgba(34,197,94,.2);  border-color: #22c55e; color: #22c55e; }

    .btn-submit {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--r);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      letter-spacing: 0.03em;
    }

    .btn-submit:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Tasks ── */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }

    .filter-chip {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-dim);
      font-size: 12px;
      cursor: pointer;
    }
    .filter-chip.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    .task-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 12px;
      margin-bottom: 10px;
    }
    .task-title { font-size: 14px; margin-bottom: 6px; }
    .task-meta { display: flex; gap: 6px; flex-wrap: wrap; }

    .badge {
      font-size: 10px;
      font-family: var(--mono);
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--surface2);
      color: var(--text-dim);
    }
    .badge-haute   { background: rgba(239,68,68,.2);  color: #ef4444; }
    .badge-moyenne { background: rgba(245,158,11,.2); color: var(--accent); }
    .badge-basse   { background: rgba(34,197,94,.2);  color: #22c55e; }

    .task-comment { margin-top: 6px; font-size: 12px; color: var(--text-dim); }

    /* ── Briefing ── */
    .briefing-content {
      background: var(--surface);
      border-radius: var(--r);
      padding: 16px;
      line-height: 1.75;
    }
    .briefing-content h1 { font-size: 17px; color: var(--accent); margin-bottom: 14px; }
    .briefing-content h2 { font-size: 14px; color: var(--text); margin: 18px 0 8px; padding-top: 14px; border-top: 1px solid var(--border); }
    .briefing-content p  { color: var(--text-dim); margin-bottom: 10px; font-size: 14px; }
    .briefing-content ul, .briefing-content ol { padding-left: 18px; color: var(--text-dim); margin-bottom: 10px; }
    .briefing-content li { margin-bottom: 5px; font-size: 14px; }
    .briefing-content strong { color: var(--text); }
    .briefing-content em { color: var(--text-dim); font-size: 12px; }
    .briefing-content blockquote { border-left: 3px solid var(--accent); padding-left: 12px; margin: 12px 0; color: var(--text-dim); font-style: italic; }
    .briefing-content code { background: var(--surface2); padding: 1px 6px; border-radius: 4px; font-family: var(--mono); font-size: 12px; }
    .briefing-content hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

    /* ── Shared ── */
    .empty-state {
      text-align: center;
      color: var(--text-dim);
      padding: 48px 20px;
      font-size: 14px;
    }
    .empty-state .icon { font-size: 32px; margin-bottom: 10px; }

    .loading { text-align: center; color: var(--text-dim); padding: 24px; font-size: 13px; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--success);
      color: #000;
      padding: 11px 22px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 600;
      opacity: 0;
      transition: all .3s;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.err  { background: var(--danger); color: #fff; }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<!-- ══════════════ AUTH ══════════════ -->
<div id="authScreen">
  <div class="logo">okta</div>
  <div class="tagline">Capture · Tâches · Briefing</div>
  <button class="btn-signin" onclick="signIn()">
    <svg width="18" height="18" viewBox="0 0 24 24">
      <path fill="currentColor" d="M12.545 10.239v3.821h5.445c-.712 2.315-2.647 3.972-5.445 3.972a6.033 6.033 0 1 1 0-12.064c1.498 0 2.866.549 3.921 1.453l2.814-2.814A9.969 9.969 0 0 0 12.545 2C7.021 2 2.543 6.477 2.543 12s4.478 10 10.002 10c8.396 0 10.249-7.85 9.426-11.748z"/>
    </svg>
    Se connecter avec Google
  </button>
</div>

<!-- ══════════════ APP ══════════════ -->
<div id="app">

  <div class="header">
    <div class="header-logo">okta</div>
    <div class="header-user" id="userEmail"></div>
  </div>

  <div class="content">

    <!-- ── CAPTURE ── -->
    <div class="panel active" id="panelCapture">
      <div class="section-title">Nouvelle tâche</div>

      <div class="form-group">
        <label>Titre *</label>
        <input type="text" id="fTitle" placeholder="Ce que tu dois faire…" autocomplete="off" autocorrect="on">
      </div>

      <div class="form-group">
        <label>Projet *</label>
        <select id="fProject">
          <option value="opra">OPRA</option>
          <option value="sga">SGA</option>
          <option value="medy">MEDY</option>
          <option value="july">JULY</option>
          <option value="ladc">LADC</option>
          <option value="transverse">Transverse</option>
          <option value="presta">Presta</option>
          <option value="perso" selected>Perso</option>
        </select>
      </div>

      <div class="form-group">
        <label>Priorité</label>
        <div class="prio-group">
          <div class="prio-btn" data-p="haute"   onclick="setPrio('haute')">🔴 Urgent</div>
          <div class="prio-btn sel-moyenne" data-p="moyenne" onclick="setPrio('moyenne')">🟡 Normal</div>
          <div class="prio-btn" data-p="basse"   onclick="setPrio('basse')">🟢 Basse</div>
        </div>
      </div>

      <div class="form-group">
        <label>Statut</label>
        <select id="fStatus">
          <option value="a_demarrer" selected>À démarrer</option>
          <option value="en_cours">En cours</option>
          <option value="en_reflexion">En réflexion</option>
          <option value="en_attente">En attente</option>
          <option value="a_relancer">À relancer</option>
          <option value="a_valider">À valider</option>
        </select>
      </div>

      <div class="form-group">
        <label>Commentaire</label>
        <textarea id="fComment" placeholder="Contexte, liens, notes…"></textarea>
      </div>

      <div class="form-group">
        <label>Échéance</label>
        <input type="date" id="fDue">
      </div>

      <button class="btn-submit" id="btnSubmit" onclick="submitTask()">
        ＋ Ajouter la tâche
      </button>
    </div>

    <!-- ── TÂCHES ── -->
    <div class="panel" id="panelTasks">
      <div class="filter-bar">
        <div class="filter-chip active" data-f="all"        onclick="setFilter('all')">Toutes</div>
        <div class="filter-chip"        data-f="opra"       onclick="setFilter('opra')">OPRA</div>
        <div class="filter-chip"        data-f="sga"        onclick="setFilter('sga')">SGA</div>
        <div class="filter-chip"        data-f="medy"       onclick="setFilter('medy')">MEDY</div>
        <div class="filter-chip"        data-f="july"       onclick="setFilter('july')">JULY</div>
        <div class="filter-chip"        data-f="ladc"       onclick="setFilter('ladc')">LADC</div>
        <div class="filter-chip"        data-f="transverse" onclick="setFilter('transverse')">Transverse</div>
        <div class="filter-chip"        data-f="presta"     onclick="setFilter('presta')">Presta</div>
        <div class="filter-chip"        data-f="perso"      onclick="setFilter('perso')">Perso</div>
      </div>
      <div id="tasksList"><div class="loading">Chargement…</div></div>
    </div>

    <!-- ── BRIEFING ── -->
    <div class="panel" id="panelBriefing">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div class="section-title" style="margin-bottom:0" id="briefingMeta">Briefing</div>
        <button onclick="loadBriefing(true)" style="background:var(--surface);border:1px solid var(--border);color:var(--text-dim);padding:6px 12px;border-radius:var(--r);font-size:12px;cursor:pointer">↻ Rafraîchir</button>
      </div>
      <div id="briefingContent"><div class="loading">Chargement du briefing…</div></div>
    </div>

  </div><!-- /content -->

  <div class="tabbar">
    <button class="tab active" id="tabCapture"  onclick="switchTab('Capture')">
      <span class="icon">➕</span><span>Capture</span>
    </button>
    <button class="tab"        id="tabTasks"    onclick="switchTab('Tasks')">
      <span class="icon">📋</span><span>Tâches</span>
    </button>
    <button class="tab"        id="tabBriefing" onclick="switchTab('Briefing')">
      <span class="icon">📄</span><span>Briefing</span>
    </button>
  </div>

</div><!-- /app -->

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
//  CONFIG — Remplace VOTRE_CLIENT_ID par ton Client ID
//  (celui sauvegardé dans G:\Mon Drive\Claude\)
// ═══════════════════════════════════════════════════════
const CLIENT_ID     = '603921039271-chapqasq4tenoirq67kbl0vi6pl8bc9t.apps.googleusercontent.com';
const TASKS_FILE_ID = '13feLFJ8QgitNNOUJiiX85pvXU7v3tkH5';
const SCOPES        = 'https://www.googleapis.com/auth/drive';

// ─── State ───────────────────────────────────────────
let tokenClient  = null;
let accessToken  = null;
let tasksData    = null;
let currentPrio  = 'moyenne';
let currentFilter= 'all';

const STATUS_LABELS  = { a_demarrer:'À démarrer', en_cours:'En cours', en_reflexion:'En réflexion', en_attente:'En attente', a_relancer:'À relancer', a_valider:'À valider' };
const PROJECT_LABELS = { opra:'OPRA', sga:'SGA', medy:'MEDY', july:'JULY', ladc:'LADC', transverse:'Transverse', presta:'Presta', perso:'Perso' };

// ─── Auth ─────────────────────────────────────────────
function signIn() {
  if (!window.google) { showToast('Chargement en cours, réessaie dans 2s', true); return; }
  if (!tokenClient) {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: handleToken
    });
  }
  tokenClient.requestAccessToken({ prompt: '' });
}

function handleToken(resp) {
  if (resp.error) { showToast('Erreur auth : ' + resp.error, true); return; }
  accessToken = resp.access_token;
  onSignedIn();
}

async function onSignedIn() {
  try {
    const r = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
      headers: { Authorization: `Bearer ${accessToken}` }
    });
    const u = await r.json();
    document.getElementById('userEmail').textContent = u.email || '';
  } catch(_) {}

  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  loadTasks();
  loadBriefing();
}

// ─── Drive API ───────────────────────────────────────
async function driveRead(fileId) {
  const r = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
    headers: { Authorization: `Bearer ${accessToken}` }
  });
  if (!r.ok) throw new Error(`Drive read ${r.status}`);
  return r.text();
}

async function driveWrite(fileId, content) {
  const r = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
    method: 'PATCH',
    headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
    body: content
  });
  if (!r.ok) throw new Error(`Drive write ${r.status}`);
}

async function driveSearch(name) {
  const q = encodeURIComponent(`name='${name}' and trashed=false`);
  const r = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`, {
    headers: { Authorization: `Bearer ${accessToken}` }
  });
  const d = await r.json();
  return d.files || [];
}

// ─── Tasks ────────────────────────────────────────────
async function loadTasks() {
  try {
    const raw = await driveRead(TASKS_FILE_ID);
    tasksData = JSON.parse(raw);
    renderTasks();
  } catch(e) {
    document.getElementById('tasksList').innerHTML =
      `<div class="empty-state"><div class="icon">⚠️</div>Impossible de charger les tâches</div>`;
  }
}

function renderTasks() {
  const el = document.getElementById('tasksList');
  if (!tasksData) { el.innerHTML = '<div class="loading">Chargement…</div>'; return; }

  let tasks = tasksData.tasks.filter(t => !t.done);
  if (currentFilter !== 'all') tasks = tasks.filter(t => t.project === currentFilter);

  const prioOrd = { haute: 0, moyenne: 1, basse: 2 };
  tasks.sort((a, b) => (prioOrd[a.priority]||1) - (prioOrd[b.priority]||1));

  if (!tasks.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">✅</div>Aucune tâche${currentFilter !== 'all' ? ' pour ce projet' : ''}</div>`;
    return;
  }

  el.innerHTML = tasks.map(t => `
    <div class="task-item">
      <div class="task-title">${esc(t.title)}</div>
      <div class="task-meta">
        <span class="badge badge-${t.priority}">${t.priority === 'haute' ? '🔴' : t.priority === 'basse' ? '🟢' : '🟡'} ${t.priority}</span>
        <span class="badge">${PROJECT_LABELS[t.project] || t.project}</span>
        <span class="badge">${STATUS_LABELS[t.status] || t.status}</span>
        ${t.due ? `<span class="badge">📅 ${t.due}</span>` : ''}
      </div>
      ${t.comment ? `<div class="task-comment">${esc(t.comment.slice(0,100))}${t.comment.length > 100 ? '…' : ''}</div>` : ''}
    </div>`
  ).join('');
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(el =>
    el.classList.toggle('active', el.dataset.f === f));
  renderTasks();
}

async function submitTask() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { showToast('Le titre est requis', true); return; }

  const btn = document.getElementById('btnSubmit');
  btn.disabled = true;
  btn.textContent = 'Enregistrement…';

  try {
    const raw  = await driveRead(TASKS_FILE_ID);
    const data = JSON.parse(raw);
    const now  = new Date().toISOString();

    const task = {
      id:          String(Date.now()),
      title,
      project:     document.getElementById('fProject').value,
      priority:    currentPrio,
      status:      document.getElementById('fStatus').value,
      comment:     document.getElementById('fComment').value.trim(),
      due:         document.getElementById('fDue').value || null,
      done:        false,
      createdAt:   now,
      updatedAt:   now,
      completedAt: null
    };

    data.tasks.push(task);
    data.count = data.tasks.filter(t => !t.done).length;
    data.date  = now;

    await driveWrite(TASKS_FILE_ID, JSON.stringify(data, null, 2));
    tasksData = data;

    showToast('✅ Tâche ajoutée !');
    resetForm();

  } catch(e) {
    showToast('Erreur : ' + e.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = '＋ Ajouter la tâche';
  }
}

function resetForm() {
  document.getElementById('fTitle').value   = '';
  document.getElementById('fComment').value = '';
  document.getElementById('fDue').value     = '';
  document.getElementById('fProject').value = 'perso';
  document.getElementById('fStatus').value  = 'a_demarrer';
  setPrio('moyenne');
  document.getElementById('fTitle').focus();
}

// ─── Briefing ─────────────────────────────────────────
async function loadBriefing(force = false) {
  const today    = todayISO();
  const filename = `okta-briefing-${today}.md`;

  document.getElementById('briefingMeta').textContent = `Briefing — ${today}`;
  if (force) {
    document.getElementById('briefingContent').innerHTML = '<div class="loading">Chargement…</div>';
  }

  try {
    const files = await driveSearch(filename);
    if (!files.length) {
      document.getElementById('briefingContent').innerHTML =
        `<div class="empty-state"><div class="icon">📄</div>Pas de briefing pour aujourd'hui.<br>Prochain brief à 08h00.</div>`;
      return;
    }
    const md = await driveRead(files[0].id);
    document.getElementById('briefingContent').innerHTML =
      `<div class="briefing-content">${marked.parse(md)}</div>`;
  } catch(e) {
    document.getElementById('briefingContent').innerHTML =
      `<div class="empty-state"><div class="icon">⚠️</div>Erreur de chargement du briefing</div>`;
  }
}

// ─── UI helpers ───────────────────────────────────────
function switchTab(name) {
  ['Capture','Tasks','Briefing'].forEach(n => {
    document.getElementById('panel' + n).classList.toggle('active', n === name);
    document.getElementById('tab'   + n).classList.toggle('active', n === name);
  });
  if (name === 'Tasks' && tasksData) renderTasks();
  if (name === 'Briefing') loadBriefing();
}

function setPrio(p) {
  currentPrio = p;
  document.querySelectorAll('.prio-btn').forEach(el => {
    const ep = el.dataset.p;
    el.className = 'prio-btn' + (ep === p ? ` sel-${ep}` : '');
  });
}

function showToast(msg, isErr = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (isErr ? ' err' : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = ''; }, 2800);
}

function todayISO() {
  return new Date().toLocaleDateString('fr-CA'); // → YYYY-MM-DD
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
